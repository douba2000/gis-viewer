<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>簡易GIS - Viewer</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
 
<style>
body {
  margin:0; 
  display:flex; 
  height:100vh; 
  font-family:sans-serif; 
  padding-top: env(safe-area-inset-top);
  padding-left: 35px;   /* 左余白 */
  padding-right: 35px;  /* 右余白 */
  padding-bottom: env(safe-area-inset-bottom);
}

/* 地図 */
#map { 
  flex:4; 
  position:relative; 
  transition:flex 0.3s;
  height:100%;
}

/* 右パネル */
#rightPanel {
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden; /* 子要素の表示崩れを防ぐ */
  transition:flex 0.3s;
}
#rightPanel.collapsed { flex:0; }
#tableWrapper { flex:1; overflow:auto; transition: flex 0.3s; }


#panelHeader { 
  background:#eee; 
  padding:4px; 
  cursor:pointer; 
  text-align:right; 
}



/* 表ラッパー */
#tableWrapper {
  flex:1;
  overflow-x:auto;  
  overflow-y:auto;
  transition:height 0.3s;
}
#tableWrapper.collapsed { display:none; }

/* 操作パネル */
#controls {
  padding:10px;
  display:flex; 
  flex-direction:column;
  background: rgba(255,255,255,0.95);
  border-radius:8px; 
  box-shadow: 0 3px 8px rgba(0,0,0,0.3);
  z-index:1000; 
  position:absolute; 
  top: calc(5px + env(safe-area-inset-top));
  left: calc(5px + env(safe-area-inset-left));
}

button, select, input { 
  font-size:16px; 
  margin-bottom:5px; 
}

/* controls開閉用 */
#controlsHeader { 
  margin-bottom:5px; 
  display: flex;
  justify-content: flex-end;
  align-items: center;
  padding: 0px 4px;
  background: rgba(240,240,240,0.9);
  border-radius: 6px;
  user-select: none;
}
#controlsBody { display: flex; flex-direction: column; }
#controls.collapsed #controlsBody { display: none; }
#controls {
  z-index: 1000;          /* 常に凡例より前面 */
}

/* ⭐ここが重要（修正済み） */
#dataTable {
  border-collapse: collapse;
  width: max-content; 
  font-size:16px;
  table-layout: auto;
}

/* 右パネル矢印を大きくする */
#toggleArrow {
  position: absolute;  /* 絶対位置 */
  top: 50%;            /* 縦中央 */
  right: 0;            /* 右端 */
  transform: translateY(-50%);
  font-size: 20px;
  cursor: pointer;
  user-select: none;
  background: #eee;    /* 見やすく */
  padding: 4px 4px;
  border-radius: 4px 0 0 4px;
  z-index: 1001;
}
 

/* 左上操作パネル矢印を大きくする */
#controlsToggle {
  position: relative;  /* 絶対位置をやめる */
line-height: 1;

  font-size: 20px;
  cursor: pointer;
  user-select: none;
  z-index: 10;
  margin-left: auto;  /* 右端に寄せる */
}

/* ⭐縦文字防止 */
th, td { 
  border:1px solid #ccc; 
  padding:4px 8px; 
  text-align:left; 
  box-sizing:border-box;
  white-space: nowrap;
  word-break: keep-all; 
}

th { background:#eee; }

tbody tr:hover { 
  background:#f0f0f0; 
  cursor:pointer; 
}

/* 凡例 */
#legend {
  position: fixed;  /* ←ここ変更が本命 */
  top: calc(24px + 10px + env(safe-area-inset-top));
  left: 0;          /* ←画面の左端に固定 */
  width: 130px;
  max-height: calc(100vh - 60px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
  overflow-y: auto;
  border: 1px solid #999;
  background: white;
  padding: 2px;
  font-size: 12px;
  display: none;
  z-index: 999;
}

  /* 追加 */
  touch-action: pan-y;             /* 縦スクロールだけ許可 */
  overscroll-behavior: contain;    /* スクロールバウンスを地図に伝えない */
  -webkit-overflow-scrolling: touch; /* iOSで慣性スクロール対応 */
}

/* スマホ対応 */
@media (max-width: 800px) {
  body {
    padding-left: calc(35px + env(safe-area-inset-left, 0px));
    padding-right: calc(35px + env(safe-area-inset-right, 0px));
  }

  #map { flex:3; }

  #rightPanel { 
    flex:1;
    min-width: 0;
  }

  button, select, input { font-size:14px !important; }

  #dataTable { 
    font-size:14px;
    width: max-content;
    min-width: 100%;
  }

  #controlsHeader{
    padding: 4px 6px !important;
    font-size: 16px !important;  
  }
}
</style>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>

<body>

<div id="map">
  <div id="controls">
    <div id="controlsHeader">
      <span id="controlsToggle">&#9660;</span>
    </div>
    <div id="controlsBody">
      <button id="importCsvBtn">CSV読み込み</button>
      <label>色分け列: <select id="colorColumnSelect"></select></label>
      <label>最小値: <input id="minValue" type="number" placeholder="自動"></label>
      <label>最大値: <input id="maxValue" type="number" placeholder="自動"></label>
      <label>段階数: <input id="steps" type="number" placeholder="10"></label>
      <button id="applyColorScale">適用</button>
      <input type="text" id="searchInput" placeholder="圃場名を検索">
    </div>
  </div>

  <!-- 凡例はここに置く -->
  <div id="legend"></div>
</div>

<div id="rightPanel">
  <div id="tableWrapper">
    <table id="dataTable">
      <thead><tr id="headerRow"></tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<!-- 矢印はパネル外に置く -->
<div id="toggleArrow">&#9664;</div>


<script>
let map = L.map('map', { 
  zoomSnap:0.01, zoomDelta:0.01, wheelPxPerZoomLevel:200, minZoom:5, maxZoom:20, zoomControl:false,
  tap: true, touchZoom: true, dragging: true
}).setView([44.03,141.69],13);

L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  attribution: 'Tiles &copy; Esri'
}).addTo(map);

let polygonMap=[], selectedRow=null, selectedPolygons=[], DATA_COLUMNS=15;
const colors10=['#0000ff','#0040ff','#0080ff','#00bfff','#00ffbf','#00ff00','#ffff00','#ffbf00','#ff8000','#ff0000'];
const maxColumnColors = [
 '#1f77b4','#ff7f0e','#2ca02c','#d62728','#9467bd',
 '#8c564b','#e377c2','#7f7f7f','#bcbd22','#17becf',
 '#393b79','#637939','#8c6d31','#843c39','#7b4173'
];

function brightenColor(hex, percent=40){
  let num = parseInt(hex.replace("#",""),16);
  let r = (num >> 16) + Math.round(255 * percent / 100);
  let g = ((num >> 8) & 0x00FF) + Math.round(255 * percent / 100);
  let b = (num & 0x0000FF) + Math.round(255 * percent / 100);

  r = Math.min(255, r);
  g = Math.min(255, g);
  b = Math.min(255, b);

  return "#" + (r<<16 | g<<8 | b).toString(16).padStart(6,'0');
}


function addRow(rowData){
  const tbody=document.getElementById("tableBody");
  const tr=document.createElement("tr");

  rowData.forEach((v,i)=>{
    const td=document.createElement("td");
    td.innerText=v||"";
    if(i===0) td.className="nameCell";
    tr.appendChild(td);
  });
  const areaTd=document.createElement("td"); areaTd.className="areaCell"; tr.appendChild(areaTd);
  const landUseTd=document.createElement("td"); landUseTd.className="landUseCell"; tr.appendChild(landUseTd);

  tr.addEventListener("click",()=>selectRow(tr));

  tbody.appendChild(tr);
  return tr;
}

function selectRow(tr){
  if(selectedRow){
    selectedRow.style.backgroundColor="";
    selectedPolygons.forEach(poly=>{

  if(!poly.originalColor){
    // ★値なしポリゴンは元の半透明グレーに戻す
    poly.setStyle({
      fillColor: '#999',
      color: '#666',
      weight: 2,
      fillOpacity: 0.4
    });

  } else {
    // ★値ありは元の色に戻す
    poly.setStyle({
      fillColor: poly.originalColor,
      color: 'gray',
      weight: 2,
      fillOpacity: 1
    });
  }

});
  }
  selectedRow=tr;
  tr.style.backgroundColor="#ffd";
  selectedPolygons=tr.polygons||[];
 selectedPolygons.forEach(poly=>{

  if(!poly.originalColor){
    // 値なし → 見た目を変えない（超重要）
    poly.setStyle({
      color: 'yellow',
      weight: 4,
      // fillはいじらない
    });
  } else {
    // 値あり → 普通に色維持
    poly.setStyle({
      color: 'yellow',
      weight: 4,
      fillColor: poly.originalColor,
      fillOpacity: 1
    });
  }

});

  if(selectedPolygons.length>0){
    let latSum=0,lngSum=0,count=0;
    selectedPolygons.forEach(poly=>{
      poly.getLatLngs()[0].forEach(latlng=>{
        latSum+=latlng.lat; lngSum+=latlng.lng; count++;
      });
    });
    if(count>0) map.panTo([latSum/count,lngSum/count]);
    tr.scrollIntoView({behavior:"smooth", block:"center"});
  }
}

function recolorPolygonsByColumn(columnKey){
  const legendDiv=document.getElementById("legend"); legendDiv.innerHTML="";

  if(columnKey==="landUseCell"){
    const vals=polygonMap.map(({row})=>row.querySelector(".landUseCell")?.innerText||"").filter(v=>v);
    const uniqueVals=[...new Set(vals)]; 
    const colorMap={};
    uniqueVals.forEach(v=>{
      const randomColor = '#'+Math.floor(Math.random()*16777215).toString(16).padStart(6,'0');
colorMap[v] = brightenColor(randomColor, 40);
    });
    uniqueVals.forEach(v=>{
      const color=colorMap[v];
      const item=document.createElement("div");
      item.innerHTML=`<span style="display:inline-block;width:20px;height:20px;background:${color};margin-right:5px;border:1px solid #000;"></span>${v}`;
      legendDiv.appendChild(item);
    });
    polygonMap.forEach(({poly,row})=>{
  const val = row.querySelector(".landUseCell")?.innerText || "";
  const c = colorMap[val] || 'gray';
  poly.originalColor = c;
  poly.setStyle({
    fillColor: c,
    color: 'gray',   // ← ここを必ず 'gray' に固定
    weight: 2,
    fillOpacity: 1
  });
});
  } else if(columnKey==="rowMaxColumn"){
    polygonMap.forEach(({poly,row})=>{
  const nums = Array.from(row.children).slice(1, DATA_COLUMNS).map(td=>parseFloat(td.innerText)||0);
  const maxVal = Math.max(...nums);
  const maxIdx = nums.indexOf(maxVal);
  const base = maxColumnColors[maxIdx % maxColumnColors.length] || 'gray';
const color = brightenColor(base, 40);
  poly.originalColor = color;
  poly.setStyle({
    fillColor: color,
    color: 'gray',   // ← ここを必ず 'gray'
    weight: 2,
    fillOpacity: 1
  });
});

    const headerRow = document.getElementById("headerRow");
    Array.from(headerRow.children).slice(1, DATA_COLUMNS).forEach((th,i)=>{
      const color = brightenColor(maxColumnColors[i % maxColumnColors.length], 40);
      const item=document.createElement("div");
      item.innerHTML=`<span style="display:inline-block;width:20px;height:20px;
background:${color};margin-right:5px;border:1px solid #000;"></span>${th.innerText}`;
      legendDiv.appendChild(item);
    });

  } else {
    let minVal=parseFloat(document.getElementById("minValue").value);
    let maxVal=parseFloat(document.getElementById("maxValue").value);
    let steps=parseInt(document.getElementById("steps").value);
    if(isNaN(minVal)) minVal=0; if(isNaN(maxVal)) maxVal=100; if(isNaN(steps)||steps<1) steps=10;

    polygonMap.forEach(({poly,row})=>{
  let val=parseFloat(row.children[columnKey]?.innerText);
  if(isNaN(val)||val<=0){ 
  poly.originalColor = null;  // ←これが超重要
  poly.setStyle({
    fillColor: '#999',
    color: '#666',
    fillOpacity: 0.4
  }); 
  return; 
}
  let normalized=(val-minVal)/(maxVal-minVal);
  if(normalized<0) normalized=0;
  if(normalized>1) normalized=1;
  let idx=Math.floor(normalized*steps);
  if(idx>=colors10.length) idx=colors10.length-1;
  const bright = brightenColor(colors10[idx], 40);
poly.originalColor = bright;
poly.setStyle({
  fillColor: bright,
    color: 'gray',   // ← ここも固定
    weight: 2,
    fillOpacity: 1
  });
});

    for(let i=0;i<steps;i++){
      let start=(minVal+i*(maxVal-minVal)/steps).toFixed(0);
      let end=(minVal+(i+1)*(maxVal-minVal)/steps).toFixed(0);
      const item=document.createElement("div");
      item.innerHTML=`<span style="display:inline-block;width:20px;height:20px;background:${brightenColor(colors10[i]||colors10[colors10.length-1], 40)};margin-right:5px;border:1px solid #000;"></span>${start} ～ ${end}`;
      legendDiv.appendChild(item);
    }
  }
}

function importCSV(){
  const input=document.createElement("input");
  input.type="file"; input.accept=".csv"; input.style.display="none";
  document.body.appendChild(input);
  input.addEventListener("change",e=>{
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=function(){
      const lines=reader.result.split(/\r?\n/).filter(Boolean);
      if(lines.length===0) return;
      const headerLine=lines[0].split(",");
      const headerRow=document.getElementById("headerRow"); headerRow.innerHTML="";
      const colorSelect=document.getElementById("colorColumnSelect"); 
      colorSelect.innerHTML='<option value="landUseCell">作目</option>';

      let th=document.createElement("th"); th.innerText="名前"; headerRow.appendChild(th);
      for(let i=1;i<=DATA_COLUMNS;i++){
        if(i===15) continue;
        th=document.createElement("th"); th.innerText=headerLine[i]||`データ${i}`; headerRow.appendChild(th);
        const opt=document.createElement("option"); opt.value=i; opt.text=headerLine[i]||`データ${i}`; colorSelect.appendChild(opt);
      }
      th=document.createElement("th"); th.innerText="面積(ha)"; headerRow.appendChild(th);
      th=document.createElement("th"); th.innerText="作目"; headerRow.appendChild(th);

      const maxColOpt=document.createElement("option");
      maxColOpt.value="rowMaxColumn"; maxColOpt.text="行内最大値列";
      colorSelect.appendChild(maxColOpt);

      polygonMap=[];
      lines.slice(1).forEach(line=>{
        const vals=line.split(",");
        const rowData=[vals[0]]; 
        for(let i=1;i<=DATA_COLUMNS;i++){ if(i===15) continue; rowData.push(vals[i]||""); }
        const tr=addRow(rowData);

        if(vals[15]) tr.querySelector(".areaCell").innerText = (parseFloat(vals[15])/10000).toFixed(1);
        tr.querySelector(".landUseCell").innerText=vals[16]||"";

        const polyVal=vals[17]||"";
        if(polyVal){
          try{
            const decoded=JSON.parse(atob(polyVal));
            if(Array.isArray(decoded)){
              tr.polygons=[];
              decoded.forEach(latlngs=>{
                if(!latlngs||latlngs.length===0) return;

                const poly=L.polygon(latlngs,{color:'gray',weight:2,fillOpacity:1}).addTo(map);
                poly.originalColor='gray';
                polygonMap.push({poly,row:tr});
                tr.polygons.push(poly);

                poly.on("click", ()=>selectRow(tr));
              });
            }
          }catch(err){ console.warn("ポリゴン復元失敗",err); }
        }
      });

      if(polygonMap.length>0){
        const group=L.featureGroup(polygonMap.map(p=>p.poly));
        map.fitBounds(group.getBounds().pad(0.1));
      }

      recolorPolygonsByColumn("landUseCell");
showOnlyNameAndSelected("landUseCell");
    };
    reader.readAsText(file,'utf-8');
  });
  input.click(); 
  document.body.removeChild(input);
}

document.getElementById("importCsvBtn").addEventListener("click",importCSV);
document.getElementById("applyColorScale").addEventListener("click",()=>recolorPolygonsByColumn(document.getElementById("colorColumnSelect").value));

const rightPanel = document.getElementById("rightPanel");
const tableWrapper = document.getElementById("tableWrapper");
const toggleArrow = document.getElementById("toggleArrow");

toggleArrow.addEventListener("click", ()=>{
  rightPanel.classList.toggle("collapsed");
  toggleArrow.innerHTML = rightPanel.classList.contains("collapsed") ? "&#9654;" : "&#9664;";
  map.invalidateSize();
});
rightPanel.addEventListener("transitionend", ()=>{ map.invalidateSize(); });

document.getElementById("searchInput").addEventListener("input", function() {
  const keyword = this.value.toLowerCase();
  const rows = document.querySelectorAll("#tableBody tr");
  rows.forEach(tr => {
    const name = tr.children[0]?.innerText.toLowerCase() || "";
    tr.style.display = name.includes(keyword) ? "" : "none";
  });
});

const controls = document.getElementById("controls");
const controlsToggle = document.getElementById("controlsToggle");

// toggleControls関数内で凡例の表示位置を更新
function toggleControls() {
  controls.classList.toggle("collapsed");
  controlsToggle.innerHTML = controls.classList.contains("collapsed") ? "&#9654;" : "&#9660;";

  const legend = document.getElementById("legend");
  if (controls.classList.contains("collapsed")) {
    legend.style.display = "block";
    // controlsの下端 + 隙間10pxに設定
    const rect = controls.getBoundingClientRect();
    legend.style.top = (rect.bottom + 10) + "px"; // ←ここで隙間を追加
    legend.style.left = rect.left + "px";
  } else {
    legend.style.display = "none";
  }

  setTimeout(() => map.invalidateSize(), 310);
}

controlsToggle.addEventListener("click", toggleControls);
controlsToggle.addEventListener("touchstart", (e) => { 
  e.preventDefault();
  toggleControls();
}, {passive:false});

// 入力後にキーボード閉じても画面を戻す
const searchInput = document.getElementById("searchInput");
searchInput.addEventListener("blur", () => {
  setTimeout(() => {
    map.invalidateSize();   // Leaflet地図を正しくリサイズ
    window.scrollTo(0,0);  // 画面を上に戻す
  }, 300);  // キーボードが閉じるのを少し待つ
});


const legend = document.getElementById("legend");
legend.addEventListener("touchstart", e => e.stopPropagation());
legend.addEventListener("touchmove", e => e.stopPropagation());
legend.addEventListener("wheel", e => e.stopPropagation());


function showOnlyNameAndSelected(selectedIndex){
  const rows = document.querySelectorAll("#dataTable tr");

  rows.forEach(row => {
    Array.from(row.children).forEach((cell, i) => {

      // 作目のとき
      if(selectedIndex === "landUseCell"){
        if(i === 0 || cell.className === "landUseCell"){
          cell.style.display = "";
        } else {
          cell.style.display = "none";
        }
      }

      // 通常の列（数字）
      else{
        if(i === 0 || i === selectedIndex){
          cell.style.display = "";
        } else {
          cell.style.display = "none";
        }
      }

    });
  });
}

document.getElementById("colorColumnSelect").addEventListener("change", e=>{
  const val = e.target.value;

  recolorPolygonsByColumn(val);

  if(val === "landUseCell"){
    showOnlyNameAndSelected("landUseCell");
  } else if(val === "rowMaxColumn"){
    showAllColumns();
  } else {
    showOnlyNameAndSelected(parseInt(val));
  }
});
function showAllColumns(){
  const rows = document.querySelectorAll("#dataTable tr");

  rows.forEach(row => {
    Array.from(row.children).forEach(cell => {
      cell.style.display = "";
    });
  });
}

</script>

</body>
</html>
